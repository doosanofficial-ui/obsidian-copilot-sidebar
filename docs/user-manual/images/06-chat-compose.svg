<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 420" width="660" height="420">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
  <rect width="660" height="420" fill="#1e1e2e" rx="12"/>
  <text x="30" y="35" font-family="system-ui,sans-serif" font-size="15" fill="#e0e0f0" text-anchor="start" font-weight="700">채팅 메시지 입력 및 전송</text>

  <!-- Chat area -->
  <rect x="20" y="55" width="620" height="200" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <text x="35" y="80" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="700">MESSAGES</text>
  
  <rect x="30" y="90" width="600" height="45" rx="8" fill="rgba(122,162,247,0.14)" stroke="#44445a" stroke-width="1"/>
  <text x="42" y="110" font-family="system-ui,sans-serif" font-size="9" fill="#888899" text-anchor="start" font-weight="600">USER</text>
  <text x="42" y="125" font-family="system-ui,sans-serif" font-size="12" fill="#c0caf5" text-anchor="start" font-weight="normal">이 노트의 핵심 포인트를 정리해줘</text>
  
  <rect x="30" y="143" width="600" height="55" rx="8" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="42" y="163" font-family="system-ui,sans-serif" font-size="9" fill="#888899" text-anchor="start" font-weight="600">ASSISTANT</text>
  <text x="42" y="181" font-family="system-ui,sans-serif" font-size="12" fill="#c0caf5" text-anchor="start" font-weight="normal">핵심 포인트를 아래와 같이 정리했습니다...</text>

  <!-- Composer -->
  <rect x="20" y="265" width="620" height="80" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <rect x="30" y="275" width="510" height="60" rx="8" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="305" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">Ask Copilot about this vault...</text>
  <rect x="550" y="285" width="80" height="44" rx="6" fill="#7aa2f7" stroke="#44445a" stroke-width="1"/><text x="590" y="311" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Send</text>

  <!-- Step annotations -->
  <circle cx="30" cy="310" r="14" fill="#ff6b6b"/><text x="30" y="315" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">1</text>
  <text x="70" y="360" font-family="system-ui,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="start" font-weight="700">① 텍스트 영역에 질문 입력</text>
  <circle cx="590" cy="330" r="14" fill="#ff6b6b"/><text x="590" y="335" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">2</text>
  <text x="450" y="368" font-family="system-ui,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="start" font-weight="700">② Send 버튼 클릭</text>
  <text x="450" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="start" font-weight="700">   또는 Enter 키</text>

  <!-- Streaming indicator note -->
  <rect x="20" y="395" width="620" height="20" rx="8" fill="none" stroke="none" stroke-width="1"/>
  <text x="30" y="410" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">💡 응답 중에는 입력란과 Send 버튼이 비활성화됩니다 (스트리밍 표시: ...)</text>
</svg>
