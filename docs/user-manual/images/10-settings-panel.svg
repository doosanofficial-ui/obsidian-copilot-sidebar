<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 440" width="660" height="440">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
  <rect width="660" height="440" fill="#1e1e2e" rx="12"/>
  <text x="30" y="35" font-family="system-ui,sans-serif" font-size="15" fill="#e0e0f0" text-anchor="start" font-weight="700">설정 패널</text>

  <rect x="20" y="55" width="620" height="370" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <text x="35" y="80" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="700">SETTINGS</text>

  <!-- Model -->
  <rect x="30" y="90" width="600" height="40" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="115" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">Model</text>
  <rect x="200" y="97" width="200" height="26" rx="6" fill="#1e1e2e" stroke="#44445a" stroke-width="1"/>
  <text x="215" y="115" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="start" font-weight="normal">gpt-5.3-codex        ▼</text>
  <text x="420" y="115" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="start" font-weight="700">← AI 모델 선택</text>

  <!-- Context Policy -->
  <rect x="30" y="140" width="600" height="40" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">Context Policy</text>
  <rect x="200" y="147" width="200" height="26" rx="6" fill="#1e1e2e" stroke="#44445a" stroke-width="1"/>
  <text x="215" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="start" font-weight="normal">Selection First      ▼</text>
  <text x="420" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="start" font-weight="700">← 컨텍스트 전략</text>

  <!-- Write Policy -->
  <rect x="30" y="190" width="600" height="40" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">Write Policy</text>
  <rect x="200" y="197" width="200" height="26" rx="6" fill="#1e1e2e" stroke="#44445a" stroke-width="1"/>
  <text x="215" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="start" font-weight="normal">Confirm Before Apply ▼</text>
  <text x="420" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="start" font-weight="700">← 변경 적용 방식</text>

  <!-- Debug Logging -->
  <rect x="30" y="240" width="600" height="40" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="265" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">Debug Logging</text>
  <rect x="200" y="252" width="20" height="20" rx="4" fill="#1e1e2e" stroke="#44445a" stroke-width="1"/>
  <text x="420" y="265" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="start" font-weight="700">← 디버그 로그 ON/OFF</text>

  <!-- Retry Failed -->
  <rect x="30" y="290" width="600" height="40" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="315" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">Retry Failed Prompt</text>
  <rect x="200" y="302" width="20" height="20" rx="4" fill="#1e1e2e" stroke="#44445a" stroke-width="1"/>
  <text x="210" y="316" font-family="system-ui,sans-serif" font-size="12" fill="#7aa2f7" text-anchor="middle" font-weight="normal">✓</text>
  <text x="420" y="315" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="start" font-weight="700">← 실패 프롬프트 자동 재시도</text>

  <!-- Diagnostics Box -->
  <rect x="30" y="340" width="600" height="70" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="360" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">Diagnostics</text>
  <rect x="30" y="365" width="600" height="40" rx="6" fill="#1e1e2e" stroke="#44445a" stroke-width="1"/>
  <text x="45" y="380" font-family="system-ui,sans-serif" font-size="9" fill="#888899" text-anchor="start" font-weight="normal">firstTokenLatency: 245ms | responseDuration: 1230ms</text>
  <text x="45" y="393" font-family="system-ui,sans-serif" font-size="9" fill="#888899" text-anchor="start" font-weight="normal">tokenCount: 156 | streamRenders: 3 | lastError: none</text>
  <text x="420" y="365" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="start" font-weight="700">← 실시간 진단 정보</text>
</svg>
