<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
  <rect width="600" height="300" fill="#1e1e2e" rx="12"/>
  <text x="30" y="35" font-family="system-ui,sans-serif" font-size="15" fill="#e0e0f0" text-anchor="start" font-weight="700">인증 상태 뱃지 유형</text>

  <!-- logged-in -->
  <rect x="30" y="55" width="540" height="45" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <rect x="45" y="65" width="106" height="20" rx="10" fill="rgba(100,200,100,0.25)" stroke="none"/><text x="98" y="79" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Auth: logged-in</text>
  <text x="210" y="82" font-family="system-ui,sans-serif" font-size="12" fill="#c0caf5" text-anchor="start" font-weight="normal">✅ 정상 인증 — 모든 기능 사용 가능</text>

  <!-- no-entitlement -->
  <rect x="30" y="110" width="540" height="45" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <rect x="45" y="120" width="136" height="20" rx="10" fill="rgba(255,180,80,0.25)" stroke="none"/><text x="113" y="134" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Auth: no-entitlement</text>
  <text x="240" y="137" font-family="system-ui,sans-serif" font-size="12" fill="#c0caf5" text-anchor="start" font-weight="normal">⚠ Copilot 구독 없음 — GitHub에서 구독 필요</text>

  <!-- token-expired -->
  <rect x="30" y="165" width="540" height="45" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <rect x="45" y="175" width="130" height="20" rx="10" fill="rgba(255,180,80,0.25)" stroke="none"/><text x="110" y="189" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Auth: token-expired</text>
  <text x="235" y="192" font-family="system-ui,sans-serif" font-size="12" fill="#c0caf5" text-anchor="start" font-weight="normal">⚠ 토큰 만료 — Refresh Auth 버튼 클릭</text>

  <!-- offline -->
  <rect x="30" y="220" width="540" height="45" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <rect x="45" y="230" width="94" height="20" rx="10" fill="rgba(255,180,80,0.25)" stroke="none"/><text x="92" y="244" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Auth: offline</text>
  <text x="185" y="247" font-family="system-ui,sans-serif" font-size="12" fill="#c0caf5" text-anchor="start" font-weight="normal">⚠ 오프라인 — 네트워크 연결 확인</text>

  <circle cx="140" cy="86" r="90" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="4,3"/>
  <text x="30" y="290" font-family="system-ui,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="start" font-weight="700">💡 뱃지 색상: 초록 = 정상, 주황 = 주의 필요</text>
</svg>
