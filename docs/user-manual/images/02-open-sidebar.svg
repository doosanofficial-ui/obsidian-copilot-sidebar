<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
  <rect width="720" height="380" fill="#1e1e2e" rx="12"/>
  <!-- Obsidian main window mock -->
  <rect x="20" y="15" width="680" height="50" rx="10" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="360" y="47" font-family="system-ui,sans-serif" font-size="16" fill="#e0e0f0" text-anchor="middle" font-weight="700">Obsidian</text>

  <!-- Command palette mock -->
  <rect x="140" y="90" width="440" height="270" rx="12" fill="#282838" stroke="#7aa2f7" stroke-width="1"/>
  <rect x="160" y="110" width="400" height="34" rx="8" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="180" y="132" font-family="system-ui,sans-serif" font-size="13" fill="#c0caf5" text-anchor="start" font-weight="normal">> Open Copilot Sidebar</text>
  
  <!-- search results -->
  <rect x="160" y="155" width="400" height="38" rx="6" fill="rgba(122,162,247,0.14)" stroke="#7aa2f7" stroke-width="1"/>
  <text x="180" y="179" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" text-anchor="start" font-weight="600">Copilot Sidebar: Open Copilot Sidebar</text>
  
  <rect x="160" y="198" width="400" height="34" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="180" y="220" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="start" font-weight="normal">Copilot Sidebar: Ask about current note</text>
  
  <rect x="160" y="237" width="400" height="34" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="180" y="259" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="start" font-weight="normal">Copilot Sidebar: Start new chat session</text>
  
  <rect x="160" y="276" width="400" height="34" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="180" y="298" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="start" font-weight="normal">Copilot Sidebar: Apply pending changes</text>

  <!-- Annotations -->
  <circle cx="100" cy="127" r="14" fill="#ff6b6b"/><text x="100" y="132" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">1</text>
  <line x1="114" y1="127" x2="155" y2="127" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="30" y="80" font-family="system-ui,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="start" font-weight="700">① Cmd+P 로</text>
  <text x="30" y="96" font-family="system-ui,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="start" font-weight="700">명령어 팔레트 열기</text>
  
  <circle cx="100" cy="174" r="14" fill="#ff6b6b"/><text x="100" y="179" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">2</text>
  <line x1="114" y1="174" x2="155" y2="174" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="160" y="345" font-family="system-ui,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="start" font-weight="700">② "Copilot" 검색 후 "Open Copilot Sidebar" 클릭</text>
  <circle cx="360" cy="174" r="210" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="4,3"/>
</svg>
