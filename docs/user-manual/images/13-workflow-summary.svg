<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
  <rect width="760" height="340" fill="#1e1e2e" rx="12"/>
  <text x="30" y="35" font-family="system-ui,sans-serif" font-size="15" fill="#e0e0f0" text-anchor="start" font-weight="700">전체 사용 흐름 요약</text>

  <!-- Flow boxes -->
  <circle cx="60" cy="80" r="14" fill="#ff6b6b"/><text x="60" y="85" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">1</text>
  <rect x="30" y="95" width="100" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="80" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">플러그인</text>
  <text x="80" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">활성화</text>
  <line x1="135" y1="122" x2="165" y2="122" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="205" cy="80" r="14" fill="#ff6b6b"/><text x="205" y="85" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">2</text>
  <rect x="175" y="95" width="100" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="225" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">사이드바</text>
  <text x="225" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">열기</text>
  <line x1="280" y1="122" x2="310" y2="122" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="350" cy="80" r="14" fill="#ff6b6b"/><text x="350" y="85" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">3</text>
  <rect x="320" y="95" width="100" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="370" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">인증 확인</text>
  <text x="370" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">(자동)</text>
  <line x1="425" y1="122" x2="455" y2="122" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="500" cy="80" r="14" fill="#ff6b6b"/><text x="500" y="85" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">4</text>
  <rect x="465" y="95" width="120" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="525" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">질문 입력 /</text>
  <text x="525" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">노트 질문</text>
  <line x1="590" y1="122" x2="620" y2="122" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="660" cy="80" r="14" fill="#ff6b6b"/><text x="660" y="85" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">5</text>
  <rect x="625" y="95" width="115" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="682" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">AI 응답 수신</text>
  <text x="682" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">(스트리밍)</text>

  <!-- Second row -->
  <line x1="682" y1="155" x2="682" y2="185" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="660" cy="195" r="14" fill="#ff6b6b"/><text x="660" y="200" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">6</text>
  <rect x="625" y="210" width="115" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="682" y="233" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">변경사항</text>
  <text x="682" y="248" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">확인/프리뷰</text>
  <line x1="620" y1="237" x2="590" y2="237" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="520" cy="195" r="14" fill="#ff6b6b"/><text x="520" y="200" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">7</text>
  <rect x="465" y="210" width="120" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="525" y="233" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">적용/취소</text>
  <text x="525" y="248" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">결정</text>
  <line x1="460" y1="237" x2="430" y2="237" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="370" cy="195" r="14" fill="#ff6b6b"/><text x="370" y="200" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">8</text>
  <rect x="320" y="210" width="100" height="55" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="370" y="233" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">추가 질문</text>
  <text x="370" y="248" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">또는 완료</text>

  <!-- Loop arrow back -->
  <path d="M 320 237 L 270 237 Q 250 237 250 217 L 250 170 Q 250 155 270 155 L 465 155" 
        fill="none" stroke="#888899" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)"/>
  <text x="260" y="190" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="normal">반복</text>

  <text x="30" y="310" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">💡 세션 관리, 컨텍스트 추가, 설정 변경은 워크플로우 중 언제든 사용 가능합니다</text>
  <text x="30" y="330" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">💡 각 단계의 상세 내용은 위의 개별 섹션을 참고하세요</text>
</svg>
