<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
  <rect width="760" height="520" fill="#1e1e2e" rx="12"/>
  <text x="30" y="35" font-family="system-ui,sans-serif" font-size="15" fill="#e0e0f0" text-anchor="start" font-weight="700">변경사항 관리 (Preview → Apply / Discard / Undo)</text>

  <!-- Left: Pending list -->
  <rect x="20" y="55" width="300" height="200" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <text x="35" y="80" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="700">PENDING CHANGES</text>

  <rect x="30" y="90" width="280" height="70" rx="6" fill="rgba(122,162,247,0.14)" stroke="#7aa2f7" stroke-width="1"/>
  <text x="42" y="112" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" text-anchor="start" font-weight="600">Create: meeting-notes.md</text>
  <text x="42" y="130" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="normal">path: docs/meeting-notes.md</text>
  <rect x="35" y="137" width="60" height="20" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="65" y="151" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Preview</text>
  <rect x="100" y="137" width="52" height="20" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="126" y="151" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Apply</text>
  <rect x="157" y="137" width="60" height="20" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="187" y="151" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Discard</text>

  <rect x="30" y="168" width="280" height="70" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/>
  <text x="42" y="190" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" text-anchor="start" font-weight="600">Modify: index.md</text>
  <text x="42" y="208" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="normal">path: index.md</text>
  <rect x="35" y="215" width="60" height="20" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="65" y="229" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Preview</text>
  <rect x="100" y="215" width="52" height="20" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="126" y="229" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Apply</text>
  <rect x="157" y="215" width="60" height="20" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="187" y="229" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Discard</text>

  <!-- Right: Preview panel -->
  <rect x="340" y="55" width="400" height="200" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <text x="355" y="80" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="700">CHANGE PREVIEW</text>
  <text x="355" y="100" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0f0" text-anchor="start" font-weight="600">Create: meeting-notes.md</text>
  <text x="355" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#888899" text-anchor="start" font-weight="normal">docs/meeting-notes.md</text>

  <rect x="350" y="125" width="380" height="60" rx="6" fill="#1e1e2e" stroke="#44445a" stroke-width="1"/>
  <text x="362" y="143" font-family="system-ui,sans-serif" font-size="10" fill="rgba(100,200,100,0.9)" text-anchor="start" font-weight="normal">+ # Meeting Notes</text>
  <text x="362" y="158" font-family="system-ui,sans-serif" font-size="10" fill="rgba(100,200,100,0.9)" text-anchor="start" font-weight="normal">+ ## 2024-01-15</text>
  <text x="362" y="173" font-family="system-ui,sans-serif" font-size="10" fill="rgba(100,200,100,0.9)" text-anchor="start" font-weight="normal">+ - 논의 사항: 프로젝트 일정 확인</text>

  <rect x="350" y="195" width="110" height="24" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="405" y="211" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Apply Previewed</text>
  <rect x="465" y="195" width="110" height="24" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="520" y="211" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Discard Previewed</text>
  <rect x="580" y="195" width="100" height="24" rx="6" fill="#313143" stroke="#44445a" stroke-width="1"/><text x="630" y="211" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="normal">Undo Last</text>

  <!-- Workflow diagram at bottom -->
  <rect x="20" y="275" width="720" height="230" rx="8" fill="#282838" stroke="#44445a" stroke-width="1"/>
  <text x="35" y="300" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="start" font-weight="700">변경사항 처리 흐름</text>

  <!-- Flow: Step 1 -->
  <circle cx="80" cy="340" r="14" fill="#ff6b6b"/><text x="80" y="345" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">1</text>
  <rect x="50" y="360" width="130" height="50" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="115" y="385" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">AI 응답에서</text>
  <text x="115" y="400" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">변경 제안 수신</text>

  <!-- Arrow -->
  <line x1="185" y1="385" x2="220" y2="385" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Flow: Step 2 -->
  <circle cx="280" cy="340" r="14" fill="#ff6b6b"/><text x="280" y="345" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">2</text>
  <rect x="230" y="360" width="130" height="50" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="295" y="385" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">Preview 클릭</text>
  <text x="295" y="400" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">diff 미리보기</text>

  <!-- Arrow -->
  <line x1="365" y1="385" x2="400" y2="385" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Flow: Step 3 - branch -->
  <circle cx="470" cy="340" r="14" fill="#ff6b6b"/><text x="470" y="345" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">3</text>
  
  <rect x="410" y="360" width="130" height="35" rx="6" fill="rgba(100,200,100,0.15)" stroke="rgba(100,200,100,0.5)" stroke-width="1"/>
  <text x="475" y="383" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="600">Apply ✓</text>

  <rect x="410" y="405" width="130" height="35" rx="6" fill="rgba(255,100,100,0.15)" stroke="rgba(255,100,100,0.5)" stroke-width="1"/>
  <text x="475" y="428" font-family="system-ui,sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="600">Discard ✗</text>

  <!-- Arrow to step 4 -->
  <line x1="545" y1="377" x2="580" y2="377" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Flow: Step 4 -->
  <circle cx="650" cy="340" r="14" fill="#ff6b6b"/><text x="650" y="345" font-family="system-ui,sans-serif" font-size="13" fill="#e0e0f0" text-anchor="middle" font-weight="700">4</text>
  <rect x="590" y="360" width="130" height="50" rx="6" fill="#313143" stroke="#7aa2f7" stroke-width="1"/>
  <text x="655" y="383" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">적용 완료</text>
  <text x="655" y="398" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">Undo로 되돌리기</text>
  <text x="655" y="413" font-family="system-ui,sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="normal">가능</text>

  <text x="35" y="480" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">💡 Write Policy가 "Auto Apply"이면 Preview 없이 자동 적용됩니다</text>
  <text x="35" y="500" font-family="system-ui,sans-serif" font-size="11" fill="#888899" text-anchor="start" font-weight="normal">💡 적용 전 파일이 변경되었으면 충돌 방지를 위해 적용이 차단됩니다</text>
</svg>
