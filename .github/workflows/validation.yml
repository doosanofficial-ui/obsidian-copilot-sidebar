name: Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  subagent-contract:
    name: subagent-contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate planning and instruction docs
        run: |
          test -f AGENTS.md
          test -f docs/atomic-task-plan.md
          test -f docs/agent-workflow.md
          test -f .vscode/settings.json
          test -f .github/prompts/assign-lanes.prompt.md
          test -f .github/prompts/subagent-check.prompt.md
          test -f .github/prompts/cli-execute.prompt.md
          test -f .github/prompts/cloud-validate.prompt.md

  copilot-cli-fast-gate:
    name: copilot-cli-fast-gate
    runs-on: ubuntu-latest
    needs: subagent-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  cloud-agent-runtime-e2e:
    name: cloud-agent-runtime-e2e
    runs-on: ubuntu-latest
    needs: copilot-cli-fast-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Runtime E2E smoke (tracked)
        run: npm run verify:tracked

      - name: Publish progress summary
        if: always()
        run: |
          if [ -f .tmp/agent-progress.md ]; then
            cat .tmp/agent-progress.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "agent-progress summary file is missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload progress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-agent-progress
          if-no-files-found: warn
          path: |
            .tmp/agent-progress.json
            .tmp/agent-progress.md
            .tmp/agent-progress-logs/
            .tmp/smoke-prepare.json
            .tmp/smoke-run.json
