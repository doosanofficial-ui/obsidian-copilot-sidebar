name: Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  subagent-contract:
    name: subagent-contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate planning and instruction docs
        run: |
          test -f AGENTS.md
          test -f docs/atomic-task-plan.md
          test -f docs/agent-workflow.md

  copilot-cli-fast-gate:
    name: copilot-cli-fast-gate
    runs-on: ubuntu-latest
    needs: subagent-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  cloud-agent-runtime-e2e:
    name: cloud-agent-runtime-e2e
    runs-on: ubuntu-latest
    needs: copilot-cli-fast-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Runtime E2E smoke
        run: npm run verify:e2e
